<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EliteDrive Rentals</title>

<style>
*{box-sizing:border-box;font-family:Inter;margin:0;padding:0}
body{background:#0b0b0f;color:white}

header{
display:flex;justify-content:space-between;align-items:center;
padding:20px 40px;position:sticky;top:0;background:rgba(0,0,0,.7);
backdrop-filter:blur(10px)
}

.logo{font-weight:700}

nav{display:flex;gap:15px}
nav a{color:#aaa;text-decoration:none;font-size:14px}

.btn{
background:white;color:black;padding:12px 16px;border-radius:999px;
border:none;cursor:pointer;font-weight:600
}

.hero{text-align:center;padding:100px 20px;max-width:900px;margin:auto}

.hero h1{font-size:50px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;padding:60px
}

.card{
background:#15151d;border:1px solid #222;padding:20px;border-radius:16px
}

.modal{
display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
align-items:center;justify-content:center
}

.modal-content{
background:white;color:black;padding:25px;border-radius:16px;
width:90%;max-width:400px
}

input{
width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:10px
}

@media(max-width:768px){
header{flex-direction:column;gap:10px}
nav{flex-wrap:wrap;justify-content:center}
}
</style>
</head>

<body>

<header>
<div class="logo">EliteDrive</div>
<nav>
<a href="#">Fleet</a>
<a href="#">Deals</a>
<a href="#">Support</a>
</nav>
<button class="btn" onclick="openModal()">Book Now</button>
</header>

<section class="hero">
<h1>Luxury Cars Delivered Instantly</h1>
<p>Book supercars, SUVs, and exotic vehicles in seconds.</p>
</section>

<section class="grid">

<div class="card">
<h3>Ferrari F8</h3>
<p>$1,200/day</p>
<button class="btn" onclick="book('Ferrari F8')">Reserve</button>
</div>

<div class="card">
<h3>Lamborghini Urus</h3>
<p>$950/day</p>
<button class="btn" onclick="book('Lamborghini Urus')">Reserve</button>
</div>

<div class="card">
<h3>Rolls Royce Ghost</h3>
<p>$1,500/day</p>
<button class="btn" onclick="book('Rolls Royce Ghost')">Reserve</button>
</div>

</section>

<div class="modal" id="modal">
<div class="modal-content">

<h3 id="carName">Book Car</h3>

<input id="name" placeholder="Your Name">
<input id="days" placeholder="Days">

<button class="btn" onclick="confirmBooking()">Confirm Booking</button>
<button onclick="closeModal()" style="margin-top:10px">Close</button>

<p id="msg"></p>

</div>
</div>

<script>

let selectedCar = "";

function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function book(car){
selectedCar = car;
document.getElementById("carName").innerText = "Book " + car;
openModal();
}

function confirmBooking(){
let name = document.getElementById("name").value;
let days = document.getElementById("days").value;

if(!name || !days){
document.getElementById("msg").innerText = "Fill all fields";
return;
}

localStorage.setItem("booking", JSON.stringify({name,days,car:selectedCar}));

document.getElementById("msg").innerText = "Booking Confirmed!";
}

</script>

</body>
</html>
