<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Aster NYC</title>

<style>
body{margin:0;font-family:Inter;background:#0f0f12;color:white}

header{
display:flex;justify-content:space-between;padding:20px;background:rgba(0,0,0,.6)
}

.btn{background:white;color:black;padding:12px 16px;border-radius:999px;border:none;cursor:pointer}

.hero{text-align:center;padding:100px 20px}

.rooms{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:50px}

.room{background:#18181f;padding:20px;border-radius:16px;border:1px solid #222}

.modal{
display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
align-items:center;justify-content:center
}

.box{background:white;color:black;padding:25px;border-radius:16px;width:90%;max-width:400px}

input{width:100%;padding:10px;margin:8px 0}
</style>
</head>

<body>

<header>
<div><b>The Aster NYC</b></div>
<button class="btn" onclick="openBooking()">Book Room</button>
</header>

<section class="hero">
<h1>Luxury Hotel in Manhattan</h1>
<p>Rooftop pool + skyline suites</p>
</section>

<section class="rooms">

<div class="room">
<h3>Skyline Suite</h3>
<button class="btn" onclick="selectRoom('Skyline Suite')">Book</button>
</div>

<div class="room">
<h3>Rooftop Penthouse</h3>
<button class="btn" onclick="selectRoom('Penthouse')">Book</button>
</div>

</section>

<div class="modal" id="modal">
<div class="box">
<h3 id="roomTitle">Book</h3>

<input id="name" placeholder="Name">
<input id="nights" placeholder="Nights">

<button class="btn" onclick="confirm()">Confirm</button>
<button onclick="closeBooking()">Close</button>

<p id="msg"></p>
</div>
</div>

<script>

let room="";

function openBooking(){
document.getElementById("modal").style.display="flex";
}

function closeBooking(){
document.getElementById("modal").style.display="none";
}

function selectRoom(r){
room=r;
document.getElementById("roomTitle").innerText="Book "+r;
openBooking();
}

function confirm(){
let name=document.getElementById("name").value;
let nights=document.getElementById("nights").value;

if(!name||!nights){
document.getElementById("msg").innerText="Fill all fields";
return;
}

localStorage.setItem("hotel",JSON.stringify({name,nights,room}));

document.getElementById("msg").innerText="Reservation Confirmed";
}

</script>

</body>
</html>
