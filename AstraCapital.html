<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astra Capital</title>

<style>
body{font-family:Inter;background:#f5f6fa;margin:0}

header{
display:flex;justify-content:space-between;
padding:20px;background:white
}

.btn{background:#111;color:white;padding:12px 16px;border-radius:999px;border:none;cursor:pointer}

.container{padding:60px;text-align:center}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:40px}

.card{background:white;padding:20px;border-radius:14px}

.modal{
display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
align-items:center;justify-content:center
}

.box{
background:white;padding:25px;border-radius:16px;width:90%;max-width:400px
}

input{
width:100%;padding:10px;margin:8px 0
}
</style>
</head>

<body>

<header>
<div><b>Astra Capital</b></div>
<button class="btn" onclick="openForm()">Apply</button>
</header>

<div class="container">
<h1>Auto Loans & Credit Lines</h1>
<p>Instant approval decisions in minutes</p>
</div>

<div class="cards">
<div class="card">
<h3>Auto Loan</h3>
<button class="btn" onclick="openForm()">Apply</button>
</div>

<div class="card">
<h3>Credit Card</h3>
<button class="btn" onclick="openForm()">Apply</button>
</div>
</div>

<div class="modal" id="modal">
<div class="box">
<h3>Application</h3>

<input id="name" placeholder="Name">
<input id="income" placeholder="Monthly Income">

<button class="btn" onclick="submitApp()">Submit</button>
<button onclick="closeForm()">Close</button>

<p id="msg"></p>
</div>
</div>

<script>

function openForm(){
document.getElementById("modal").style.display="flex";
}

function closeForm(){
document.getElementById("modal").style.display="none";
}

function submitApp(){
let name=document.getElementById("name").value;
let income=document.getElementById("income").value;

if(!name||!income){
document.getElementById("msg").innerText="Missing fields";
return;
}

localStorage.setItem("app",JSON.stringify({name,income}));

document.getElementById("msg").innerText="Submitted!";
}

</script>

</body>
</html>
